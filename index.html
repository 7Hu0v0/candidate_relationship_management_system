<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=./demo/">
    <title>Large Model Talent CRM</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f6f7f9;
        color: #17202a;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
        box-shadow: 0 16px 36px rgba(24, 32, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: #697386;
        line-height: 1.6;
      }
      a {
        color: #147d64;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Large Model Talent CRM</h1>
      <p>正在打开 demo 工作台。</p>
      <a href="./demo/">进入 demo</a>
    </main>
  </body>
</html>
